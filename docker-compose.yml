services:
  summ-articles:
    build: .
    container_name: summarize-articles
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: news-retrieval
      POSTGRES_USER: news-retrieval
      POSTGRES_PASSWORD: news-retrieval
    stdin_open: true
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app
        - action: rebuild
          path: Dockerfile
    tty: true
    networks:
      - agents-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: news-retrieval
      POSTGRES_USER: news-retrieval
      POSTGRES_PASSWORD: news-retrieval
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news-retrieval -d news-retrieval"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agents-net

volumes:
  pgdata:

networks:
  agents-net:
    external: true
